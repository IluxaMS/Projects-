<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form class="add_tasks" style="display: block;">
        <h3>Введите задачу:</h3>
        <input type="text" class="first_input">
        <h3>Даты выполения:</h3>
        <input type="text" class="second_input">
        <h3>Описание задачи:</h3>
        <input type="text" class="third_input">
    </form>

    <div class="buttons-row">
        <button class="button_add_task">Добавить задачу</button>
        <button class="view_tasks">Посмотреть задачи</button>
    </div>

    <div class="tasks" style="display: none;">
        <button class="back" style="display: none;">Назад</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
